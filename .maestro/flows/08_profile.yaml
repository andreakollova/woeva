appId: com.woeva.app
name: "08 - Profil"
---
- launchApp

# Tab Profil
- tapOn:
    id: "tab-profile"
- assertVisible:
    text: ".*"
    timeout: 5000
- takeScreenshot: "08_profile_screen"

# Nastavenia notifikácií
- tapOn: "Notifikácie"
    optional: true
- takeScreenshot: "08_notifications_settings"
- back

# Jazyk
- tapOn: "Jazyk"
    optional: true
- takeScreenshot: "08_language_settings"
- back

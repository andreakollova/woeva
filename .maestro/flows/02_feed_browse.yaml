appId: com.woeva.app
name: "02 - Feed browsing"
---
- launchApp

# Feed sa načítal
- assertVisible: "Bratislava"
- takeScreenshot: "02_feed_loaded"

# Scroll dolu
- scroll
- scroll
- takeScreenshot: "02_feed_scrolled"

# Tap na event
- tapOn:
    index: 0
    text: ".*"
    # Čakáme na event detail
- assertVisible:
    text: ".*"
    timeout: 5000
- takeScreenshot: "02_event_detail"

# Späť
- back
